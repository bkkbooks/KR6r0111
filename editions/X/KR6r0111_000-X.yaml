body:
  text: 佛祖宗派世譜序咄未始以前還有如是消息也無這一隊漢無端向一毫頭上分宗列派立彼立此蚤自不唧𠺕點污淨白豈堪矢上加尖形諸墨楮安名流布然事無一向所謂祖禰不了殃及兒孫吾釋迦老子一人傳虗萬人傳實自此西天四七東土二三大鑑出南嶽青原讖應二枝嫩桂四傳而有溈仰宗五傳而有臨濟宗六傳而有曹洞宗七傳而有雲門宗九傳而有法眼宗燈燈續焰葉葉相輝雖有傳有止或正或傍總是曹源一滴水燈錄會元而後今又數百年述者兩三家不無訛漏余不免依樣畫葫蘆即將傳燈宗圖續集諸書一一參考誠然直難掩曲仍以五宗原始次第詳定更為修補重新拈出非圖競彩聊使話行天下後世有耳者聞有目者見亦非分外或有箇漢出來道盡大地眾生那箇不是他家種草汝將謂只此這些阿師是續佛慧命耶金明但向他道正法眼破沙盆聻呵呵順治甲午長至日臨濟第三十一代嘉禾金明寺嗣祖沙門悟進拜題佛祖宗派世譜目錄卷一佛祖正脉諸祖旁出卷二南嶽溈仰卷三臨濟楊岐卷四黃龍大慧卷五虎丘雪岩斷橋卷六青原曹洞卷七龍潭雲門卷八雪竇法眼
