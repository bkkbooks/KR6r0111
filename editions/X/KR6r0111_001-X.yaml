body:
  text: 古吳比丘悟進編輯缾山居士項謙較閱三十三祖世系圖始祖釋迦牟尼佛即賢劫第四尊示生中天竺國剎利種釋迦其姓也父淨飯聖王母摩耶聖后周昭王九年甲寅四月八日降誕捨轉輪聖王位出家成無上道轉大法輪其後七十九歲埀般沙涅槃乃以正法眼藏付囑摩訶迦葉穆王三十六年壬申二月十五日中夜入滅後一千一十七年教被華夏即漢明帝永平十年丁卯歲也始祖釋迦文佛第一祖摩訶迦葉二祖阿難尊者三祖商那和修四祖優波毱多卍云已下較禪燈世譜而舉所不相同者若其列次大綱要就目錄知之至其少異則悉注記于禪燈世譜頭上一無有所遺矣二十一世古拙俊嗣白雲度斷橋倫下二十二世無際悟蜀中人別號蚕蠶骨正統九年應召說法二十三世月溪澄住北京廣恩寺景泰三年勅賜回南京大岡二十四世夷峯寧二十五世寶芳進住天目天淵湛突空昇祖堂興頓悟方普濟澄頂庵耐洪山賢古潭碧千峯秀節堂全古心寶無瑕鼐性天杲一庵如古心安春山景無為順中天表愚隱聰毒峯善鏡堂明峻中嶸天然正不二圓壞空成光澤惠壽堂松別傳宗雲洲海章德滿素虗理大用機月光朗妙峯玄福緣廣祥雲谷無為一寶藏玉月空大斷巖義祖圓通信首座古庭堅大巍倫無礙鑒無隱道孤舟海秋月澄無邊通獨潭昌大方疑古巖定金寶藏天竺秀嵩山福慶道人海珠澄鐵牛勒玉峯璉無學才永空如潔空通印空海華曇蒂東滄福萬峯方中峯素拙牛鑒大慧華雪屏錦定庵能無智真德巖本隱峯高松庵主雪光通默堂照太虛圖楚山琦智中國師中溪雲石經裕三池慧翠微空玉峯琳珪菴玠天成韶性空聞天然銳曉天亮濟舟濱月潭澄悅舟和無礙通海雲深天溪凝祖燈然性空潔湛淵奫香巖澄西宗祐照堂煩寂庵湛聰首座濟川洪金山寶破庵全真空悟無塵鏡碧天朗石經意性空悅大拙能東巖亮長松源大雲興鐵牛堅太虛沖德翁淳雪峯瑞龍居聰東明昇印天海盛庵昌棠城印淨慈休休幻奇雪庭南竺瓊無相真南宗勝纂佛祖宗派圖立少林巖淨能諒越空端本空住楚璧寶東惠大千滿性空覺徹空通能關主一峯慶南竺橘古鏡明寶鑑聰賢德山太初忍無涯順古靈山大初圓秀才徐宗敬天目秀雪巖清慧堂智桂堂月伏牛物外信寶月潭荊山理天倫義古溪清無用全伏牛月天金臺覺璉振宗萬松林秀峯山了禪能法幢金寶藏通潭懷圓翠峯山古峯秀伏牛斌白雲端東方古裕天通顯玉芝聚敬堂宗默堂宣吉庵祚徑山英徹堂沖拗牛祖無隱道二十五世天目寶芳進嗣夷峯寧斷橋倫下二十六世野翁曉二十七世無趣如空秀水施氏子生弘治辛亥年壽九十一萬曆庚辰八月六日說偈而化二十八世無幻性沖秀水張氏子生于嘉靖庚子年壽七十二辛亥季冬四日示寂塔徑山二十九世南明慧廣鹽官韓氏子生于萬曆丙子年泰昌庚申十一月廿七日示寂祗園性曙號古卓駱嬾翁名驤有言志集行世突空昇嗣天淵湛無盡海碧天玄月珠梅大休隆壽堂松嗣光澤惠古音琴斗峯覺海宗裕寶月鑑隱峯高嗣德岩本東巖喜南宗印無相頂濟舟洪大機全東明曉吉庵祚嗣默堂宣法舟濟雲谷會冬溪澤傑峯嗣行庵柔已上六人俱斷橋倫下信庵諶金臺順大雲興大方寬伏牛無礙理藪庵秉二十九世禹門傳嗣月心寶雪巖欽下三十世天童圓悟宜興蔣氏子號密雲崇禎壬午年示寂三十一世五峯學漢月藏破山明費隱容石車乘朝宗忍萬如微木陳忞石奇雲牧雲門浮石賢林野奇天隱圓修林臯豫玉林琇箬庵問山茨際抱樸蓮雪嶠圓信二十九世南明廣嗣無幻冲斷橋倫下三十世鴛湖妙用海鹽鄭氏子生于萬曆丁亥年崇禎壬午孟冬十一日書偈而逝塔興善普明三十一世雲峯鈞介庵進一初元卷第五曹洞宗天童法派世系圖十三世天童淨十四世鹿門覺十五世青州辨十六世大明寶十七世王山體十八世雪巖滿十九世萬松秀二十世雪庭裕二十一世靈隱泰二十二世還源遇二十三世拙才淳二十四世松庭嚴二十五世凝然改二十六世俱空斌二十七世無方從二十八世月舟載二十九世大章書三十世大千潤三十一世慈舟念三十二世湛然澄廩山忠壽昌經博山來東苑鏡鼓山賢閴然謐三十二世雲門澄號湛然會稽夏氏子天啟丙寅十二月示寂塔于顯聖三十三世指南徹麥浪懷石雨方三宜孟爾密復具足有瑞白雪東苑鏡覺浪盛博山來雪關誾卷第六
